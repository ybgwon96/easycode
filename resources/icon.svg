<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec9462"/>
      <stop offset="100%" stop-color="#da7756"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="72" y="72" width="368" height="368" rx="40"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Terminal body (dark content area) -->
  <rect x="72" y="72" width="368" height="368" rx="40" fill="#141210"
        stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Title bar (white, clipped to terminal shape) -->
  <rect x="72" y="72" width="368" height="56" fill="#e8e4e0"
        clip-path="url(#termClip)"/>

  <!-- Window dots -->
  <circle cx="118" cy="100" r="10" fill="#fb7185"/>
  <circle cx="150" cy="100" r="10" fill="#fbbf24"/>
  <circle cx="182" cy="100" r="10" fill="#34d399"/>

  <!-- >_ prompt (> is eye, _ is mouth) -->
  <path d="M150 190 L196 236 L150 282"
        fill="none" stroke="#f5ede6" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="216" y1="345" x2="296" y2="345"
        stroke="#f5ede6" stroke-width="14"
        stroke-linecap="round"/>
</svg>
